# ============================================================================
# 插件启用/禁用状态持久化 / Plugin State Persistence
# ============================================================================
# 此文件由框架自动管理，记录各插件的启用/禁用状态。
# 通过 /plugins 命令或管理 API 修改状态后，变更会保存在这里。
# 重启后框架会读取此文件恢复插件状态。
#
# 格式：module_id = true/false
#   true  = 启用
#   false = 禁用
#
# 如果某个插件在 base.toml 的 plugin_modules 中声明了，
# 但这里设为 false，则该插件不会被加载。

[modules]
"example-plugin" = true
