name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: qimenbotd
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: qimenbotd
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: qimenbotd
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: qimenbotd.exe
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release directory (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIR="qimenbot-${VERSION}-${{ matrix.target }}"
          mkdir -p "${DIR}/config/plugins" "${DIR}/plugins/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${DIR}/"
          cp config/base.toml "${DIR}/config/base.toml.example"
          cp config/plugin-state.toml "${DIR}/config/"
          touch "${DIR}/config/plugins/.gitkeep"
          touch "${DIR}/plugins/bin/.gitkeep"
          tar czf "${DIR}.tar.gz" "${DIR}"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Prepare release directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $DIR = "qimenbot-${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "${DIR}/config/plugins", "${DIR}/plugins/bin"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${DIR}/"
          Copy-Item "config/base.toml" "${DIR}/config/base.toml.example"
          Copy-Item "config/plugin-state.toml" "${DIR}/config/"
          New-Item -ItemType File -Force -Path "${DIR}/config/plugins/.gitkeep"
          New-Item -ItemType File -Force -Path "${DIR}/plugins/bin/.gitkeep"
          Compress-Archive -Path "${DIR}" -DestinationPath "${DIR}.zip"
          echo "ASSET=${DIR}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: QimenBot ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
